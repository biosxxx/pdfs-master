name: Deploy PDF Master

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout Source
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Build Static App
        run: pnpm run build

      - name: Push to Website Repository
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.DEPLOY_TOKEN }}
        with:
          source-directory: 'static/utilities/pdf-master'
          destination-github-username: 'biosxxx'
          destination-repository-name: 'cadautoscript.com'
          target-directory: 'static/utility-apps/pdf-master'
          user-email: 'bot@react-table-editor.com'
          target-branch: main
