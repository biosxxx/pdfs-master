name: Deploy PDF Master

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            apps/pdf-master/package-lock.json

      - name: Install Workspace Dependencies
        run: npm ci

      - name: Install App Dependencies
        run: npm --prefix apps/pdf-master ci

      - name: Build Static App
        run: npm run build

      - name: Push to Website Repository
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.DEPLOY_TOKEN }}
        with:
          source-directory: 'static/utilities/pdf-master'
          destination-github-username: 'biosxxx'
          destination-repository-name: 'cadautoscript.com'
          target-directory: 'static/utility-apps/pdf-master'
          user-email: 'bot@react-table-editor.com'
          target-branch: main
